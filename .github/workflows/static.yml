# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Build contracts app
        run: |
          cd contracts
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -av \
            --exclude contracts \
            --exclude firebase \
            --exclude _site \
            --exclude .git \
            --exclude .github \
            --exclude node_modules \
            . _site/
          cp -r contracts/out/admin _site/admin
          cp -r contracts/out/sign _site/sign
          cp -r contracts/out/_next _site/_next
          cp scripts/gh-pages-404.html _site/404.html
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
