<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Loading…</title>
    <script>
      (function () {
        var path = location.pathname;
        var search = location.search;
        var hash = location.hash;
        var target = null;

        function contractIdFromPath(re) {
          var match = path.match(re);
          return match && match[1] !== "_" ? match[1] : null;
        }

        var editId = contractIdFromPath(/^\/admin\/contracts\/([^/]+)\/edit\/?$/);
        if (editId) {
          target = "/admin/contracts/_/edit/?id=" + encodeURIComponent(editId);
        }

        var renewId = contractIdFromPath(/^\/admin\/contracts\/([^/]+)\/renew\/?$/);
        if (!target && renewId) {
          target = "/admin/contracts/_/renew/?id=" + encodeURIComponent(renewId);
        }

        var detailId = contractIdFromPath(/^\/admin\/contracts\/([^/]+)\/?$/);
        if (!target && detailId) {
          target = "/admin/contracts/_/?id=" + encodeURIComponent(detailId);
        }

        if (!target && /^\/sign\/([^/]+)\/?$/.test(path)) {
          var signMatch = path.match(/^\/sign\/([^/]+)\/?$/);
          if (signMatch && signMatch[1] !== "_") {
            target = "/sign/_/?token=" + encodeURIComponent(signMatch[1]);
          } else {
            target = "/sign/_/";
          }
        }

        if (target) {
          location.replace(target + search + hash);
          return;
        }

        location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
